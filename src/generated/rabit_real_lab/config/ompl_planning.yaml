# OMPL planning config (generated by generate_ompl_planning.sh).
# Per-group longest_valid_segment_fraction is set fine so OMPL cannot shortcut a
# link through a static collision object during path simplification.
planning_plugin: ompl_interface/OMPLPlanner
start_state_max_bounds_error: 0.1
jiggle_fraction: 0.05
request_adapters: >-
    default_planner_request_adapters/AddTimeOptimalParameterization
    default_planner_request_adapters/ResolveConstraintFrames
    default_planner_request_adapters/FixWorkspaceBounds
    default_planner_request_adapters/FixStartStateBounds
    default_planner_request_adapters/FixStartStateCollision
    default_planner_request_adapters/FixStartStatePathConstraints

vx300s:
  planner_configs:
    - RRTConnect
    - RRTstar
  projection_evaluator: joints(vx300s_shoulder_pan_joint,vx300s_shoulder_lift_joint)
  longest_valid_segment_fraction: 0.005

arm_169_254_200_200:
  planner_configs:
    - RRTConnect
    - RRTstar
  projection_evaluator: joints(arm_169_254_200_200_shoulder_pan_joint,arm_169_254_200_200_shoulder_lift_joint)
  longest_valid_segment_fraction: 0.005

all_arms:
  planner_configs:
    - RRTConnect
  projection_evaluator: joints(vx300s_shoulder_pan_joint,vx300s_shoulder_lift_joint)
  longest_valid_segment_fraction: 0.005
