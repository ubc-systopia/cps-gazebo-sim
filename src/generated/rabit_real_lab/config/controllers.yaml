# controllers.yaml generated dynamically
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true

    # Controller definitions
    vx300s_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    arm_169_254_200_200_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

vx300s_joint_trajectory_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - vx300s_shoulder_pan_joint
      - vx300s_shoulder_lift_joint
      - vx300s_elbow_joint
      - vx300s_wrist_1_joint
      - vx300s_wrist_2_joint
      - vx300s_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

arm_169_254_200_200_joint_trajectory_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - arm_169_254_200_200_shoulder_pan_joint
      - arm_169_254_200_200_shoulder_lift_joint
      - arm_169_254_200_200_elbow_joint
      - arm_169_254_200_200_wrist_1_joint
      - arm_169_254_200_200_wrist_2_joint
      - arm_169_254_200_200_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true
    joints:
      - vx300s_shoulder_pan_joint
      - vx300s_shoulder_lift_joint
      - vx300s_elbow_joint
      - vx300s_wrist_1_joint
      - vx300s_wrist_2_joint
      - vx300s_wrist_3_joint
      - arm_169_254_200_200_shoulder_pan_joint
      - arm_169_254_200_200_shoulder_lift_joint
      - arm_169_254_200_200_elbow_joint
      - arm_169_254_200_200_wrist_1_joint
      - arm_169_254_200_200_wrist_2_joint
      - arm_169_254_200_200_wrist_3_joint
